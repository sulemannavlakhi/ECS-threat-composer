name: Terraform Initialize and Plan

on:
  push:
  workflow_dispatch:


jobs:
  init-and-plan:
    runs-on: ubuntu-latest

    permissions:
        id-token: write
        contents: read
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
         aws-region: ${{ secrets.AWS_REGION }}
         role-to-assume: ${{ secrets.AWS_CRED }}
         role-session-name: terraform-init-plan
    
      - name: run checkov to scan for vulnerabilities 
        id: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ECS-threat-composer/terraform
          soft_fail: true
         
      - name: Terraform Install
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        working-directory: terraform  
        run: terraform init

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6
        with:
         tflint_version: v0.52.0
         cache: true

      - name: Show version
        run: tflint --version

      - name: Init TFLint
        run: tflint --init
        env:
         GITHUB_TOKEN: ${{ github.token }}

      - name: Run TFLint
        run: tflint -f compact

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Create tfvars file
        run: echo "${{ secrets.TF_VARS }}" > terraform.tfvars

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -var-file="terraform.tfvars"